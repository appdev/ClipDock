name: Bug report / 问题反馈
description: Report a ClipDock bug / 反馈 ClipDock 问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请先复现一次问题，然后复制诊断信息。
        Please reproduce the issue once, then copy the diagnostics report.

        macOS 复制诊断信息 / Copy diagnostics on macOS:
        1. 复现问题 / Reproduce the issue.
        2. 不要再复制其他内容 / Do not copy anything else.
        3. 打开菜单栏 ClipDock 菜单 / Open ClipDock from the macOS menu bar.
        4. 选择“复制剪贴板诊断信息” / Choose "Copy Clipboard Diagnostics".
        5. 粘贴到“诊断信息”字段 / Paste it into Diagnostics.

  - type: textarea
    id: problem
    attributes:
      label: 问题描述 / Problem
      placeholder: |
        发生了什么？你期望是什么？
        What happened? What did you expect?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 平台 / Platform
      options:
        - macOS
        - Android
        - Sync server / 同步服务器
        - Cross-device sync / 跨设备同步
        - Other / 其他
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: 诊断信息 / Diagnostics
      description: 请粘贴“复制剪贴板诊断信息”的内容；如果没有这个菜单项，请说明。 / Paste the report from "Copy Clipboard Diagnostics". If the menu item is missing, tell us.
      placeholder: |
        ClipDock Clipboard Diagnostics
        generated_at=...
        app_version=...
        reader:
        decision=...
      render: text
    validations:
      required: true
